<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beca Carneiro | Galeria</title>
    <link rel="stylesheet" href="css/sobre.css">
    <link rel="stylesheet" href="css/responsivo.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>
    <header class="topo">
        <a class="topo-logo" href="index.html" aria-label="Voltar para a página inicial">
            <img src="assets/BECA-preto.png" alt="Beca Carneiro">
        </a>
       
    </header>

    <main class="galeria-imersiva">
        <section class="hero-sobre">
            

            <div class="frame-scene">
                <div class="scene-glow glow-left"></div>
                <div class="scene-glow glow-right"></div>

                <div class="frame-stage">
                    <div class="frame-inner">
                        <div class="frame-ambient"></div>
                        <div class="exposicao-base"></div>
                    </div>

                    <img class="frame-image" src="assets/moldura.jpeg" alt="Moldura decorativa dourada">

                    <div class="modelo-overlay">
                        <model-viewer class="modelo-3d" src="assets/2fashion dress 3d model.glb"
                            alt="Modelo 3D da coleção" auto-rotate camera-controls shadow-intensity="1.6"
                            exposure="1.1" interaction-prompt="none" disable-pan camera-orbit="0deg 80deg auto"
                            min-camera-orbit="auto 48deg auto" max-camera-orbit="auto 98deg auto" disable-zoom
                            field-of-view="32deg"></model-viewer>
                    </div>

                    <button class="frame-nav frame-nav-prev" type="button" data-model-nav="-1"
                        aria-label="Modelo anterior">
                        <span>&lsaquo;</span>
                    </button>

                    <button class="frame-nav frame-nav-next" type="button" data-model-nav="1"
                        aria-label="Próximo modelo">
                        <span>&rsaquo;</span>
                    </button>
                </div>

                <div class="frame-meta">
                    <span class="frame-meta-label">Galeria 3D</span>
                    <strong class="frame-model-name">Look 01</strong>
                    <small class="frame-model-count">1 / 1</small>
                    <div class="carousel-dots" aria-hidden="true"></div>
                </div>

               
                
            </div>
        </section>

        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="js/sobre.js?v=20260502"></script>
</body>

</html>
