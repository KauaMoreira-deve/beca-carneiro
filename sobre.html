<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beca Carneiro | Galeria</title>
    <link rel="stylesheet" href="css/sobre.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>
    <main class="galeria-imersiva" aria-label="Galeria da colecao">
       
        <section class="look-info" aria-labelledby="look-atual">
            <p class="look-kicker">Galeria</p>
            <h1 id="look-atual">Look 01</h1>
            <span class="linha-decorativa" aria-hidden="true"></span>
        </section>

        <section class="palco-3d" aria-label="Modelo 3D selecionado">
            <model-viewer id="modelo-principal" class="modelo-principal"
                src="assets/Meshy_AI_Burgundy_Draped_Tunic_0516040717_texture.glb" alt="Modelo 3D do Look 01"
                shadow-intensity="1.6" exposure="1.05" interaction-prompt="none"
                disable-pan disable-zoom camera-orbit="0deg 78deg auto"
                min-camera-orbit="0deg 78deg auto" max-camera-orbit="0deg 78deg auto"
                field-of-view="29deg"></model-viewer>
        </section>

        <aside class="contador" aria-label="Look atual">
            <span id="contador-atual">01</span>
            <span>08</span>
        </aside>

        <aside class="looks-lista" aria-label="Lista de looks">

            
            <button class="look-card ativo" type="button" data-look-index="0"
                data-model-src="assets/Meshy_AI_Burgundy_Draped_Tunic_0516040717_texture.glb" data-look-name="Look 01">
                <span>Look 01</span>
                <model-viewer src="assets/Meshy_AI_Burgundy_Draped_Tunic_0516040717_texture.glb"
                    alt="Miniatura 3D do Look 01" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>


            <button class="look-card" type="button" data-look-index="1"
                data-model-src="assets/Meshy_AI_Costas_Denim_Lace_Up__0516035358_texture.glb" data-look-name="Look 02">
                <span>Look 02</span>
                <model-viewer src="assets/Meshy_AI_Costas_Denim_Lace_Up__0516035358_texture.glb"
                    alt="Miniatura 3D do Look 02" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>


            <button class="look-card" type="button" data-look-index="2"
                data-model-src="assets/Meshy_AI_Crimson_Lace_and_Pink_0516042011_texture.glb" data-look-name="Look 03">
                <span>Look 03</span>
                <model-viewer src="assets/Meshy_AI_Crimson_Lace_and_Pink_0516042011_texture.glb"
                    alt="Miniatura 3D do Look 03" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>


            <button class="look-card" type="button" data-look-index="3"
                data-model-src="assets/Meshy_AI_Pearl_Trim_Pink_Palaz_0516031343_texture.glb" data-look-name="Look 04">
                <span>Look 04</span>
                <model-viewer src="assets/Meshy_AI_Pearl_Trim_Pink_Palaz_0516031343_texture.glb"
                    alt="Miniatura 3D do Look 04" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>


            <button class="look-card" type="button" data-look-index="4"
                data-model-src="assets/Meshy_AI_Navy_Lace_Yoke_Top_wi_0516034803_texture.glb" data-look-name="Look 05">
                <span>Look 05</span>
                <model-viewer src="assets/Meshy_AI_Navy_Lace_Yoke_Top_wi_0516034803_texture.glb"
                    alt="Miniatura 3D do Look 05" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>


            <button class="look-card" type="button" data-look-index="5"
                data-model-src="assets/Meshy_AI_Front_View_Outfit_0516035830_texture.glb" data-look-name="Look 06">
                <span>Look 06</span>
                <model-viewer src="assets/Meshy_AI_Front_View_Outfit_0516035830_texture.glb"
                    alt="Miniatura 3D do Look 06" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>


            <button class="look-card" type="button" data-look-index="6"
                data-model-src="assets/Meshy_AI_Crimson_Leather_and_C_0516040229_texture.glb" data-look-name="Look 07">
                <span>Look 07</span>
                <model-viewer src="assets/Meshy_AI_Crimson_Leather_and_C_0516040229_texture.glb"
                    alt="Miniatura 3D do Look 07" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>

            
            <button class="look-card" type="button" data-look-index="7"
                data-model-src="assets/Meshy_AI_Front_View_Pearl_Embe_0516041201_texture.glb" data-look-name="Look 08">
                <span>Look 08</span>
                <model-viewer src="assets/Meshy_AI_Front_View_Pearl_Embe_0516041201_texture.glb"
                    alt="Miniatura 3D do Look 08" shadow-intensity="1" exposure="1.05" interaction-prompt="none"
                    disable-pan disable-zoom camera-orbit="0deg 78deg auto" field-of-view="32deg"></model-viewer>
            </button>

            <div class="setas">
                <button type="button" data-look-nav="-1" aria-label="Look anterior">&lt;</button>
                <button type="button" data-look-nav="1" aria-label="Proximo look">&gt;</button>
            </div>
        </aside>
    </main>
    <script src="js/sobre.js"></script>
</body>

</html>
